<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NV_Strategy_Multiplayer_Extreme</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Верхняя панель управления */
        #interface-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px;
            background: #222;
            border-bottom: 4px solid #444;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            z-index: 999;
        }

        button {
            background: #333;
            color: #fff;
            border: 2px solid #555;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        button:hover {
            background: #444;
            border-color: #ff9900;
        }

        input {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px;
        }

        /* Статистика игроков */
        #stats-layer {
            position: fixed;
            top: 130px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 900;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border: 1px solid #666;
            min-width: 200px;
        }

        /* Карта */
        #viewport {
            position: absolute;
            top: 130px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a1a;
            overflow: auto;
        }

        #map-canvas {
            position: relative;
            width: 2000px;
            height: 1500px;
        }

        .city-node {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid #000;
            border-radius: 5px;
            text-align: center;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .city-node:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .selected-node {
            outline: 5px solid gold;
            z-index: 100;
        }

        /* Цвета стран */
        .Germany { background: #444; }
        .France { background: #0055ff; }
        .USSR { background: #aa0000; }
        .UK { background: #5500aa; }
        .Spain { background: #aa5500; }
        .Italy { background: #008866; }
        .Poland { background: #ddd; color: #000; }
        .Yugoslavia { background: #226622; }
        .Romania { background: #aa8800; }
        .Sweden { background: #006688; }
        .Finland { background: #888; color: #000; }

        /* Экраны переходов */
        #overlay-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .bombed-city {
            border: 4px dotted yellow !important;
            box-shadow: 0 0 15px red;
        }
    </style>
</head>
<body>

<div id="overlay-screen">
    <h1 id="next-player-info" style="font-size: 40px; color: gold;">ОЖИДАНИЕ...</h1>
    <p style="font-size: 20px;">Передайте управление следующему игроку</p>
    <button style="padding: 20px 50px; font-size: 25px; background: #c0392b;" onclick="hideOverlay()">Я ГОТОВ! НАЧАТЬ ХОД</button>
</div>

<div id="interface-main">
    <div style="width: 100%; display: flex; gap: 10px; margin-bottom: 5px;">
        <input id="input-countries" style="width: 300px;" placeholder="Страна 1, Страна 2 (через запятую)">
        <button onclick="initMultiplayerGame()" style="background: #27ae60;">СТАРТ ИГРЫ</button>
        <button onclick="finishCurrentTurn()" style="background: #e67e22;">ЗАВЕРШИТЬ ХОД</button>
        <div id="current-turn-label" style="font-weight: bold; font-size: 18px; margin-left: 20px; color: #0f0;">Ожидание...</div>
    </div>
    
    <button onclick="setInteractionLevel('inspect')">ИНФО</button>
    <button onclick="setInteractionLevel('buildFactory')">ЗАВОД (5000)</button>
    <button onclick="setInteractionLevel('tankPlant')">ТАНК. ЗАВОД (25000)</button>
    <button onclick="setInteractionLevel('airBase')">АЭРОДРОМ (30000)</button>
    <button onclick="orderNewPlane()">КУПИТЬ САМОЛЕТ (5000)</button>
    <button onclick="setInteractionLevel('deployArmy')">ВЫСАДИТЬ ВОЙСКА</button>
    <button onclick="setInteractionLevel('movePlanes')">ПЕРЕЛЕТ САМОЛЕТА</button>
    <button onclick="setInteractionLevel('bombStrike')">АВИАУДАР 🔥</button>
    <button onclick="setInteractionLevel('landAttack')">АТАКА ⚔️</button>
    <button onclick="requestPeaceTreaty()">МИР</button>
</div>

<div id="stats-layer">
    <div id="p1-info-panel" class="stat-box">
        <h3 id="p1-name-tag">Игрок 1: ---</h3>
        💰Деньги: <span id="p1-money">0</span><br>
        🪖Резерв: <span id="p1-res">0</span><br>
        🚓Танки: <span id="p1-tank">0</span><br>
        ✈️Авиа: <span id="p1-air">0</span>
    </div>
    <div id="p2-info-panel" class="stat-box">
        <h3 id="p2-name-tag">Игрок 2: ---</h3>
        💰Деньги: <span id="p2-money">0</span><br>
        🪖Резерв: <span id="p2-res">0</span><br>
        🚓Танки: <span id="p2-tank">0</span><br>
        ✈️Авиа: <span id="p2-air">0</span>
    </div>
</div>

<div id="viewport">
    <div id="map-canvas"></div>
</div>

<script>
    /* =========================================================
       ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И НАСТРОЙКИ (БОЛЕЕ 500 СТРОК ЛОГИКИ)
       =========================================================
    */

    let gameActiveStatus = false;
    let turnOwner = 1; // 1 или 2
    let currentInteractionMode = null;
    let currentlySelectedCity = null;
    let cityDatabase = [];
    let stateOfWar = {};

    // Данные Игрока 1
    let p1_name = "";
    let p1_money = 500;
    let p1_reserve_infantry = 0;
    let p1_reserve_tanks = 0;
    let p1_reserve_planes = 0;

    // Данные Игрока 2
    let p2_name = "";
    let p2_money = 500;
    let p2_reserve_infantry = 0;
    let p2_reserve_tanks = 0;
    let p2_reserve_planes = 0;

    // Таймеры и События
    let globalTimerFrame = 0;
    let strikeEffectActive = false;
    let eventCycleType = 'good'; // good -> bad
    let capturesCountInCurrentTurn = 0;

    const countryCapitals = {
        Germany: 'Berlin', France: 'Paris', USSR: 'Moscow', UK: 'London',
        Spain: 'Madrid', Italy: 'Rome', Romania: 'Bucharest',
        Yugoslavia: 'Belgrade', Finland: 'Helsinki', Sweden: 'Stockholm', Poland: 'Warsaw'
    };

    /* ФУНКЦИЯ ОБНОВЛЕНИЯ ИНТЕРФЕЙСА (ДЕТАЛЬНАЯ)
    */
    function refreshUserInterface() {
        // Игрок 1
        document.getElementById("p1-money").innerText = Math.floor(p1_money);
        document.getElementById("p1-res").innerText = Math.floor(p1_reserve_infantry);
        document.getElementById("p1-tank").innerText = Math.floor(p1_reserve_tanks);
        document.getElementById("p1-air").innerText = Math.floor(p1_reserve_planes);
        document.getElementById("p1-name-tag").innerText = "Игрок 1: " + p1_name;

        // Игрок 2
        document.getElementById("p2-money").innerText = Math.floor(p2_money);
        document.getElementById("p2-res").innerText = Math.floor(p2_reserve_infantry);
        document.getElementById("p2-tank").innerText = Math.floor(p2_reserve_tanks);
        document.getElementById("p2-air").innerText = Math.floor(p2_reserve_planes);
        document.getElementById("p2-name-tag").innerText = "Игрок 2: " + p2_name;

        // Текущий ход
        let currentName = (turnOwner === 1) ? p1_name : p2_name;
        document.getElementById("current-turn-label").innerText = "ХОД: " + currentName;
        document.getElementById("current-turn-label").style.color = (turnOwner === 1) ? "#3498db" : "#e74c3c";
    }

    /*
       ФУНКЦИИ УПРАВЛЕНИЯ ГОРОДАМИ
    */
    function createCityNode(cityName, countryName, posX, posY) {
        let cityObj = {
            id: cityDatabase.length,
            name: cityName,
            country: countryName,
            x: posX,
            y: posY,
            infantry: 10,
            tanks: 0,
            planes: 0,
            factoryLevel: 0,
            maxFactories: 2,
            hasTankPlant: false,
            tankBuildProgress: 0,
            hasAirStrip: false,
            isNuclearBombed: false,
            element: null
        };

        // Если это стартовая страна одного из игроков
        if (countryName === p1_name || countryName === p2_name) {
            cityObj.infantry = 0;
            cityObj.factoryLevel = 0;
        } else {
            cityObj.factoryLevel = 1;
        }

        let domNode = document.createElement("div");
        domNode.className = "city-node " + countryName;
        domNode.style.left = posX + "px";
        domNode.style.top = posY + "px";
        domNode.onclick = function() { handleCityNodeClick(cityObj, domNode); };
        
        cityObj.element = domNode;
        cityDatabase.push(cityObj);
        document.getElementById("map-canvas").appendChild(domNode);
        redrawCityNode(cityObj);
    }

    function redrawCityNode(city) {
        let bombClass = city.isNuclearBombed ? " bombed-city" : "";
        city.element.className = "city-node " + city.country + bombClass;
        
        city.element.innerHTML = `
            <strong style="color:yellow">${city.name}</strong><br>
            🪖${Math.floor(city.infantry)} | 🚓${city.tanks}<br>
            ${city.planes > 0 ? "✈️" + city.planes : ""}<br>
            🏭${city.factoryLevel}/${city.maxFactories}
            <div style="font-size:8px">
                ${city.hasAirStrip ? "[АЭРО]" : ""} ${city.hasTankPlant ? "[ТАНК]" : ""}
            </div>
        `;
    }

    /*
       ОБРАБОТКА КЛИКОВ
    */
    function handleCityNodeClick(city, element) {
        if (!gameActiveStatus) return;

        // Очистка выделения
        let allNodes = document.getElementsByClassName("city-node");
        for (let i = 0; i < allNodes.length; i++) {
            allNodes[i].classList.remove("selected-node");
        }
        element.classList.add("selected-node");

        let activePlayerName = (turnOwner === 1) ? p1_name : p2_name;

        // Режим ИНФО
        if (currentInteractionMode === 'inspect') {
            alert("Город: " + city.name + "\nВладелец: " + city.country + "\nГарнизон: " + city.infantry + " чел.");
        }

        // Строительство завода
        if (currentInteractionMode === 'buildFactory') {
            if (city.country === activePlayerName) {
                if (city.factoryLevel < city.maxFactories) {
                    if (deductMoney(5000)) {
                        city.factoryLevel++;
                        alert("Завод построен в " + city.name);
                    }
                } else { alert("Максимум заводов!"); }
            } else { alert("Это не ваш город!"); }
        }

        // Танковый завод
        if (currentInteractionMode === 'tankPlant') {
            if (city.country === activePlayerName && countryCapitals[city.country] === city.name) {
                if (!city.hasTankPlant) {
                    if (deductMoney(25000)) {
                        city.hasTankPlant = true;
                        alert("Танковая линия запущена в столице!");
                    }
                } else { alert("Завод уже есть."); }
            } else { alert("Только в столице своей страны!"); }
        }

        // Аэродром
        if (currentInteractionMode === 'airBase') {
            if (city.country === activePlayerName) {
                if (!city.hasAirStrip) {
                    if (deductMoney(30000)) {
                        city.hasAirStrip = true;
                        alert("Аэродром готов!");
                    }
                }
            }
        }

        // Высадка войск из резерва
        if (currentInteractionMode === 'deployArmy') {
            if (city.country === activePlayerName) {
                let choice = prompt("Что высадить? (1 - пехота, 2 - танки)");
                let amount = parseInt(prompt("Сколько единиц?"));
                if (choice === '1') {
                    if (turnOwner === 1 && amount <= p1_reserve_infantry) { p1_reserve_infantry -= amount; city.infantry += amount; }
                    else if (turnOwner === 2 && amount <= p2_reserve_infantry) { p2_reserve_infantry -= amount; city.infantry += amount; }
                    else { alert("Недостаточно резервов!"); }
                }
                if (choice === '2') {
                    if (turnOwner === 1 && amount <= p1_reserve_tanks) { p1_reserve_tanks -= amount; city.tanks += amount; }
                    else if (turnOwner === 2 && amount <= p2_reserve_tanks) { p2_reserve_tanks -= amount; city.tanks += amount; }
                }
            }
        }

        // Перелет самолетов
        if (currentInteractionMode === 'movePlanes') {
            if (city.country === activePlayerName && city.hasAirStrip) {
                let currentPlanes = (turnOwner === 1) ? p1_reserve_planes : p2_reserve_planes;
                let amount = parseInt(prompt("У вас " + currentPlanes + " самолетов в резерве. Сколько отправить в " + city.name + "?"));
                if (amount <= currentPlanes) {
                    if (turnOwner === 1) p1_reserve_planes -= amount; else p2_reserve_planes -= amount;
                    city.planes += amount;
                }
            } else { alert("Нужен ваш город и аэродром!"); }
        }

        // АВИАУДАР
        if (currentInteractionMode === 'bombStrike') {
            if (city.country !== activePlayerName) {
                if (currentlySelectedCity && currentlySelectedCity.country === activePlayerName && currentlySelectedCity.planes > 0) {
                    let count = parseInt(prompt("Сколько самолетов отправить на бомбардировку " + city.name + "?"));
                    if (count <= currentlySelectedCity.planes) {
                        currentlySelectedCity.planes -= count;
                        city.infantry = 0;
                        city.tanks = 0;
                        city.isNuclearBombed = true;
                        stateOfWar[city.country] = true;
                        alert("БОМБАРДИРОВКА ЗАВЕРШЕНА. ОБОРОНА УНИЧТОЖЕНА.");
                    }
                } else { alert("Сначала выберите свой город с самолетами!"); }
            }
        }

        // АТАКА
        if (currentInteractionMode === 'landAttack') {
            if (currentlySelectedCity && currentlySelectedCity.country === activePlayerName && currentlySelectedCity !== city) {
                performBattle(currentlySelectedCity, city);
            }
        }

        currentlySelectedCity = city;
        redrawCityNode(city);
        refreshUserInterface();
    }

    /*
       МЕХАНИКА БОЯ И ЗАХВАТА
    */
    function performBattle(attacker, defender) {
        let type = prompt("Атаковать чем? (1 - Пехота, 2 - Танки)");
        let num = parseInt(prompt("Количество для атаки?"));
        
        if (defender.country !== attacker.country) stateOfWar[defender.country] = true;

        if (defender.isNuclearBombed) {
            executeConquer(defender, attacker.country, (type === '1' ? num : 0));
        } else {
            if (type === '2' && attacker.tanks >= num) {
                attacker.tanks -= num;
                if (num * 100 >= defender.infantry) executeConquer(defender, attacker.country, 0);
                else defender.infantry -= (num * 100);
            }
            if (type === '1' && attacker.infantry >= num) {
                attacker.infantry -= num;
                if (num >= defender.infantry) executeConquer(defender, attacker.country, num - defender.infantry);
                else defender.infantry -= num;
            }
        }
        redrawCityNode(attacker);
        redrawCityNode(defender);
    }

    function executeConquer(targetCity, newOwnerName, leftTroops) {
        let oldOwner = targetCity.country;
        targetCity.country = newOwnerName;
        targetCity.infantry = leftTroops;
        targetCity.tanks = 0;
        targetCity.isNuclearBombed = false;
        targetCity.factoryLevel = 0;
        capturesCountInCurrentTurn++;

        alert(targetCity.name + " ЗАХВАЧЕН!");

        // Проверка капитуляции
        if (countryCapitals[oldOwner] === targetCity.name) {
            alert("СТРАНА " + oldOwner + " КАПИТУЛИРОВАЛА!");
            for (let i = 0; i < cityDatabase.length; i++) {
                if (cityDatabase[i].country === oldOwner) {
                    cityDatabase[i].country = newOwnerName;
                    cityDatabase[i].infantry = 0;
                    cityDatabase[i].tanks = 0;
                    redrawCityNode(cityDatabase[i]);
                }
            }
        }
    }

    /*
       ДЕНЕЖНАЯ ЛОГИКА
    */
    function deductMoney(price) {
        if (turnOwner === 1) {
            if (p1_money >= price) { p1_money -= price; return true; }
        } else {
            if (p2_money >= price) { p2_money -= price; return true; }
        }
        alert("Недостаточно денег!");
        return false;
    }

    function orderNewPlane() {
        let activePlayer = (turnOwner === 1) ? 1 : 2;
        let hasAero = false;
        let currentName = (turnOwner === 1) ? p1_name : p2_name;

        for (let i = 0; i < cityDatabase.length; i++) {
            if (cityDatabase[i].country === currentName && cityDatabase[i].hasAirStrip) hasAero = true;
        }

        if (hasAero) {
            if (deductMoney(5000)) {
                if (turnOwner === 1) p1_reserve_planes++; else p2_reserve_planes++;
                refreshUserInterface();
            }
        } else { alert("Нужен хотя бы один аэродром!"); }
    }

    /*
       СИСТЕМА ХОДОВ И ОВЕРЛЕЙ
    */
    function finishCurrentTurn() {
        if (!gameActiveStatus) return;
        
        turnOwner = (turnOwner === 1) ? 2 : 1;
        let nextName = (turnOwner === 1) ? p1_name : p2_name;
        
        document.getElementById("next-player-info").innerText = "СЛЕДУЮЩИЙ: " + nextName;
        document.getElementById("overlay-screen").style.display = "flex";
        
        currentInteractionMode = null;
        currentlySelectedCity = null;
        capturesCountInCurrentTurn = 0;
        refreshUserInterface();
    }

    function hideOverlay() {
        document.getElementById("overlay-screen").style.display = "none";
    }

    function setInteractionLevel(m) {
        currentInteractionMode = m;
        console.log("Режим изменен на: " + m);
    }

    /*
       ИГРОВОЙ ЦИКЛ (ЕЖЕСЕКУНДНЫЙ)
    */
    setInterval(function() {
        if (!gameActiveStatus) return;

        for (let i = 0; i < cityDatabase.length; i++) {
            let c = cityDatabase[i];

            // Начисление денег владельцам
            if (c.country === p1_name) {
                if (!strikeEffectActive || turnOwner !== 1) p1_money += 5;
                if (c.factoryLevel > 0) p1_reserve_infantry += (c.factoryLevel * 0.05);
            } else if (c.country === p2_name) {
                if (!strikeEffectActive || turnOwner !== 2) p2_money += 5;
                if (c.factoryLevel > 0) p2_reserve_infantry += (c.factoryLevel * 0.05);
            } else {
                // Нейтралы медленно растут
                if (!c.isNuclearBombed) c.infantry += 0.02;
            }

            // Танковое производство
            if (c.hasTankPlant) {
                c.tankBuildProgress++;
                if (c.tankBuildProgress >= 60) {
                    if (c.country === p1_name) p1_reserve_tanks++;
                    else if (c.country === p2_name) p2_reserve_tanks++;
                    c.tankBuildProgress = 0;
                }
            }
            redrawCityNode(c);
        }
        refreshUserInterface();
    }, 1000);

    /*
       РАНДОМНЫЕ СОБЫТИЯ (5 МИНУТ)
    */
    setInterval(function() {
        if (!gameActiveStatus) return;

        let activePName = (turnOwner === 1) ? p1_name : p2_name;

        if (eventCycleType === 'good') {
            alert("СОБЫТИЕ: Прилив добровольцев для " + activePName + "! (+500 в столицу)");
            for (let i = 0; i < cityDatabase.length; i++) {
                if (cityDatabase[i].country === activePName && countryCapitals[activePName] === cityDatabase[i].name) {
                    cityDatabase[i].infantry += 500;
                }
            }
            eventCycleType = 'bad';
        } else {
            alert("СОБЫТИЕ: Забастовка рабочих у " + activePName + "! Экономика встала на 30 сек.");
            strikeEffectActive = true;
            setTimeout(function() { strikeEffectActive = false; alert("Забастовка окончена."); }, 30000);
            eventCycleType = 'good';
        }
    }, 300000);

    /*
       ИНИЦИАЛИЗАЦИЯ КАРТЫ (ПОЛНЫЙ СПИСОК)
    */
    function initMultiplayerGame() {
        let rawInput = document.getElementById("input-countries").value;
        let parts = rawInput.split(",");
        if (parts.length < 2) { alert("Введите 2 страны!"); return; }

        p1_name = parts[0].trim();
        p2_name = parts[1].trim();

        document.getElementById("map-canvas").innerHTML = "";
        cityDatabase = [];
        
        // РАССТАНОВКА ГОРОДОВ
        createCityNode('Berlin', 'Germany', 500, 200);
        createCityNode('Munich', 'Germany', 500, 320);
        createCityNode('Hamburg', 'Germany', 500, 120);
        createCityNode('Paris', 'France', 340, 250);
        createCityNode('Marseille', 'France', 360, 370);
        createCityNode('Madrid', 'Spain', 200, 380);
        createCityNode('Barcelona', 'Spain', 260, 350);
        createCityNode('London', 'UK', 200, 180);
        createCityNode('Manchester', 'UK', 200, 110);
        createCityNode('Rome', 'Italy', 460, 420);
        createCityNode('Sicily', 'Italy', 480, 520);
        createCityNode('Warsaw', 'Poland', 620, 260);
        createCityNode('Krakow', 'Poland', 620, 330);
        createCityNode('Belgrade', 'Yugoslavia', 560, 380);
        createCityNode('Zagreb', 'Yugoslavia', 520, 360);
        createCityNode('Sarajevo', 'Yugoslavia', 580, 440);
        createCityNode('Moscow', 'USSR', 760, 200);
        createCityNode('Leningrad', 'USSR', 760, 120);
        createCityNode('Kiev', 'USSR', 700, 300);
        createCityNode('Minsk', 'USSR', 700, 220);
        createCityNode('Bucharest', 'Romania', 680, 400);
        createCityNode('Cluj-Napoca', 'Romania', 650, 350);
        createCityNode('Stockholm', 'Sweden', 700, 60);
        createCityNode('Helsinki', 'Finland', 760, 60);

        gameActiveStatus = true;
        refreshUserInterface();
    }

    function requestPeaceTreaty() { alert("В этой войне победитель будет только один!"); }

</script>
</body>
</html>
